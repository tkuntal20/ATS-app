apiVersion: apps/v1
kind: Deployment

metadata:
  name: ats-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ats-backend

  template:
    metadata:
      labels:
        app: ats-backend

    spec:
      containers:
        - name: ats-backend

          image: ats-app-backend:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000